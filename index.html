<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>لیست قیمت محصولات</title>
  <script src="scripts/jquery-4.0.0.min.js"></script>
  <script src="scripts/tailwindcss.js"></script>
  <style>
    @font-face {
      font-family: "Vazirmatn";
      src: url("scripts/Vazirmatn-Medium.ttf") format("truetype");
    }

    body { background: #eef2f7; font-family: 'Vazirmatn', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; }
    .glass { background: #ffffff; box-shadow: 0 6px 18px rgba(15,23,42,0.06); }
    
    @media (max-width: 640px) {
      #modal {
        align-items: flex-start !important;
      }
      #modal > div {
        margin-top: 5vh !important;
      }
      #rating-modal > div {
        margin-top: -150px !important;
      }
    }

    .generator-input {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
      cursor: pointer;
    }

    .generator-input::-webkit-slider-runnable-track {
      height: 2px;
      background: linear-gradient(to right, #6366f1 var(--range-pct, 0%), #c0c0c0 var(--range-pct, 0%));
      border-radius: 40px;
      border: 0px solid #cbd5e1;
      box-shadow: 0px 2px 0px rgba(0, 0, 0, 0);
    }

    .generator-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 15px;
      width: 15px;
      background: #4f46e5;
      border-radius: 30px;
      border: 0px solid #996515;
      box-shadow: 0px 4px 0px rgba(212, 175, 55, 0);
      margin-top: -6.5px;
    }

    .generator-input::-moz-range-track {
      height: 2px;
      background: linear-gradient(to right, #6366f1 var(--range-pct, 0%), #c0c0c0 var(--range-pct, 0%));
      border-radius: 40px;
      border: 0px solid #cbd5e1;
      box-shadow: 0px 2px 0px rgba(0, 0, 0, 0);
    }

    .generator-input::-moz-range-thumb {
      height: 15px;
      width: 15px;
      background: #4f46e5;
      border-radius: 30px;
      border: 0px solid #996515;
      box-shadow: 0px 4px 0px rgba(212, 175, 55, 0);
    }
  </style>
  <link rel="icon" type="image/png" href="scripts/icon.png"/>
</head>
<body class="min-h-screen flex items-start justify-center p-4 xl:p-8 text-gray-900">
  <div class="max-w-6xl w-full">
    <header class="flex items-center justify-between mb-8">
      <div class="relative w-full xl:w-5/6">
        <h1 class="text-xl md:text-2xl xl:text-3xl font-bold">همتاز موتور گنبدکاووس</h1>
        <p class="text-sm md:text-base mt-2">آخرین آپدیت قیمت ها : 1404/11/09</p>
      </div>

      <div class="relative xs:w-2/6 xl:w-1/6 md:contents">
        <button id="rating" class="cursor-pointer px-4 py-2 md:py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow-md font-medium w-32 md:w-40 float-left mb-2 md:mb-0">محاسبه</button>
        <!---button id="customPrice" class="cursor-pointer px-4 py-2 md:py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow-md font-medium w-32 md:w-40 float-left md:mr-2">محاسبه</button--->
      </div>
    </header>

    <main class="rounded-xl p-2 xl:p-6">
      <div class="flex items-center justify-between gap-4">
        <div class="relative w-full">
          <input id="searchInput" type="search" placeholder="جستجوی نام محصول..." class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-200 bg-white" onclick="this.select()" />
          <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-gray-400">🔎</div>
        </div>
      </div>
      <section id="grid" class="mt-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-3 gap-6"></section>
    </main>
  </div>

  <!-- Modal اصلی -->
  <div id="modal" class="fixed inset-0 hidden items-center justify-center bg-black bg-opacity-60 p-6">
    <div class="bg-white text-slate-900 rounded-xl max-w-xl w-full p-6 shadow-2xl">
      <div class="flex items-start justify-between mb-4">
        <button id="closeModal" aria-label="بستن" class="text-gray-500 hover:text-gray-700">✕</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>
  
  <!-- مودال شرایط باجت -->
  <div class="container-rating" style="display: none;">
    <div id="rating-modal" class="fixed inset-0 items-center justify-center bg-black bg-opacity-60 p-6 hidden">
      <div class="bg-white text-slate-900 rounded-xl max-w-xl w-full p-6 shadow-2xl">
        <div class="flex items-start justify-between mb-4">
          <button id="closeModal2" aria-label="بستن" class="text-gray-500 hover:text-gray-700">✕</button>
        </div>
        
        <div class="mb-4 text-lg font-medium" style="border-bottom:1px solid #e5e7eb;padding-bottom:10px;margin-top:-10px;">محاسبه با مبلغ دلخواه</div>
        
        <div class="form-group">
          <label for="creditRating" class="text-base text-gray-600">رتبه اعتباری:</label>
          <select id="creditRating" class="text-base text-gray-900" style="width:110px; border:1px solid #80808073; border-radius:5px; padding:5px; margin:10px;">
            <option value="">انتخاب کنید</option>
            <option value="AB">A یا B</option>
            <option value="CD">C یا D</option>
          </select>
        </div>

        <div class="form-group">
          <label for="loanAmount" class="text-base text-gray-600">مبلغ اعتبار :</label>
          <input type="text" id="loanAmount" inputmode="numeric" onclick="this.select()" style="width:60%; border:1px solid #80808073; border-radius:5px; padding:5px; margin:10px;">
        </div>
        
        <div id="result" class="result-section">
          <div id="tabs-container" class="tabs-container" style="display: none;">
            <div id="tabs-header" class="tabs-header"></div>
            <div id="tabs-content" class="tabs-content"></div>
          </div>
          <div id="resultText" class="result-text" style="width:100%; background:#dcdcdc6b; padding:2%; border-radius:10px; margin-top:7px; line-height:30px;"></div>
        </div>
      </div>
    </div>
  </div>
  
  <style>
    .container-rating select, .container-rating input { 
      border: 1px solid #80808073;
      border-radius: 5px;
      padding: 5px;
      margin: 10px;
    }
    .container-rating input { width:60%; }
    *:focus { outline: none; }
    
    .loan-calculator {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      font-family: 'IRANSans', Tahoma, Arial, sans-serif;
      direction: rtl;
    }
    
    .input-section {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    
    .form-group label {
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }
    
    .result-section {
      margin-top: 20px;
    }
    
    .tabs-container {
      overflow: hidden;
    }
    
    .tabs-header {
      display: flex;
      gap: 10px;
    }
    
    .tab-button {
      padding:0.5rem 0.75rem 0.5rem 0.75rem;
      background: transparent;
      border: 1px solid #e5e7eb;
      cursor: pointer;
      font-size: 16px;
      color: #374151;
      transition: all 0.3s;
      position: relative;
      font-family: inherit;
	  border-radius:5px;
    }
    
    .tab-button.active {
      color: #ffffff;
	  border: 1px solid #4f48e5;
	  background-color: #4f48e5;
    }
    
    .tab-panel {
      display: none;
      line-height: 2;
    }
    
    .tab-panel.active {
      display: block;
    }
    
    .loan-detail {
      border-radius: 8px;
      margin-top: 20px;
    }
	
	.loan-detail p {
	color: #374151;
	border-bottom: 1px solid #e5e7eb;
	padding:5px 0;
	text-align:end;}
	
	.loan-detail p:last-child {border:0;}
	
	.loan-detail strong {margin-left:5px; color:#4b5563; font-weight:normal; float:right;}
    
  </style>
  
  <script src="scripts/app.js"></script>
  <script>
    // متغیر سراسری برای مقدار عددی
    let numericLoanAmount = 0;
    
    // مدیریت مودال
    document.addEventListener('DOMContentLoaded', function() {
      // اطمینان از مخفی بودن مودال در ابتدا
      document.querySelector('.container-rating').style.display = 'none';
      document.getElementById('rating-modal').classList.add('hidden');
      
      // نمایش مودال با کلیک روی دکمه rating
      document.getElementById('rating').addEventListener('click', function() {
        document.querySelector('.container-rating').style.display = 'block';
        document.getElementById('rating-modal').classList.remove('hidden');
        document.getElementById('rating-modal').classList.add('flex');
        
        // مقداردهی اولیه
        setTimeout(calculateLoan, 100);
      });
      
      // بستن مودال
      document.getElementById('closeModal2').addEventListener('click', function() {
        document.querySelector('.container-rating').style.display = 'none';
        document.getElementById('rating-modal').classList.add('hidden');
        document.getElementById('rating-modal').classList.remove('flex');
        document.getElementById('loanAmount').value = '';
        document.getElementById('resultText').innerText = 'لطفاً مبلغ را وارد کنید';
        document.getElementById('resultText').style.display = 'block';
        document.getElementById('tabs-container').style.display = 'none';
        numericLoanAmount = 0;
      });
    });
    
    // توابع کمکی
    function formatNumberWithCommas(number) {
      return number.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }
    
    function parseNumberWithCommas(str) {
      if (!str) return NaN;
      return parseFloat(str.replace(/,/g, '')) || NaN;
    }
    
    // رویدادهای ورودی
    document.getElementById('creditRating').addEventListener('change', calculateLoan);
    
    document.getElementById('loanAmount').addEventListener('input', function(e) {
      let value = this.value.replace(/,/g, '').replace(/\D/g, '');
      
      if (value) {
        numericLoanAmount = parseFloat(value);
        this.value = formatNumberWithCommas(value);
      } else {
        numericLoanAmount = 0;
        this.value = '';
      }
      
      calculateLoan();
    });
    
    // رویداد Enter
    document.addEventListener('keydown', (event) => {
    if(event.target.matches('#loanAmount') && event.key === 'Enter') {
        event.preventDefault();
        let value = event.target.value.trim();
        if(value && !isNaN(value)) {
            event.target.value = value + '0000000';
            event.target.dispatchEvent(new Event('input', { bubbles: true }));
            event.target.dispatchEvent(new Event('change', { bubbles: true }));
        }
    }
});
    
    function roundUpToNearestTenMillion(amount) {
      return Math.ceil(amount / 10000000) * 10000000;
    }
    
    function calculateLoan() {
      const creditRating = document.getElementById('creditRating').value;
      const loanAmount = numericLoanAmount; // استفاده از متغیر عددی
      const resultText = document.getElementById('resultText');
      const tabsContainer = document.getElementById('tabs-container');
      const tabsHeader = document.getElementById('tabs-header');
      const tabsContent = document.getElementById('tabs-content');
      
      // اعتبارسنجی
      if (!creditRating || isNaN(loanAmount) || loanAmount <= 0) {
        resultText.style.display = 'block';
        tabsContainer.style.display = 'none';
        
        if (!creditRating && !loanAmount) {
          resultText.innerText = 'لطفاً رتبه اعتباری و مبلغ را وارد کنید';
        } else if (!creditRating) {
          resultText.innerText = 'لطفاً رتبه اعتباری را انتخاب کنید';
        } else if (isNaN(loanAmount) || loanAmount <= 0) {
          resultText.innerText = 'لطفاً مبلغ معتبر وارد کنید';
        }
        return;
      }
      
      // ضرایب اقساط
      const INSTALLMENT_RATE_24 = 0.052409654285714286;
      const INSTALLMENT_RATE_30 = 0.044007776364;
      const INSTALLMENT_RATE_36 = 0.038436601647058824;
      
      const FIXED_AMOUNT_30 = 5100000000;
      const FIXED_AMOUNT_36 = 7600000000;
	  const ADDPRICE = 10000000;
      
      let allConditions = [];
      
      // بقیه منطق شرطی (همان کد قبلی)
      if (creditRating === 'AB') {
        if (loanAmount <= 2000000000) {
          allConditions.push({
            period: '۲۴ ماهه',
            guarantor: 'یک فقره چک صیادی یا سفته الکترونیکی (بدون ضامن)',
            loanAmount: loanAmount,
            installment: loanAmount * INSTALLMENT_RATE_24,
            deposit: roundUpToNearestTenMillion((loanAmount / 1000000000) * 75000000 + ADDPRICE)
          });
          
          allConditions.push({
            period: '۳۰ ماهه',
            guarantor: 'یک فقره چک صیادی + یک ضامن',
            loanAmount: FIXED_AMOUNT_30,
            installment: loanAmount * INSTALLMENT_RATE_30,
            deposit: roundUpToNearestTenMillion((FIXED_AMOUNT_30 / 1000000000) * 75000000 + ADDPRICE)
          });
          
          allConditions.push({
            period: '۳۶ ماهه',
            guarantor: 'یک فقره چک صیادی + یک ضامن',
            loanAmount: FIXED_AMOUNT_36,
            installment: loanAmount * INSTALLMENT_RATE_36,
            deposit: roundUpToNearestTenMillion((FIXED_AMOUNT_36 / 1000000000) * 75000000 + ADDPRICE)
          });
        }
        // ... بقیه شرط‌ها (مشابه کد قبلی)
        else if (loanAmount >= 2100000000 && loanAmount <= 5000000000) {
          allConditions.push({
            period: '۲۴ ماهه',
            guarantor: 'یک فقره چک صیادی(بدون ضامن) یا سفته الکترونیکی + یک ضامن',
            loanAmount: loanAmount,
            installment: loanAmount * INSTALLMENT_RATE_24,
            deposit: roundUpToNearestTenMillion((loanAmount / 1000000000) * 75000000 + ADDPRICE)
          });
          
          allConditions.push({
            period: '۳۰ ماهه',
            guarantor: 'یک فقره چک صیادی (بدون ضامن) یا سفته الکترونیکی + یک ضامن',
            loanAmount: FIXED_AMOUNT_30,
            installment: loanAmount * INSTALLMENT_RATE_30,
            deposit: roundUpToNearestTenMillion((FIXED_AMOUNT_30 / 1000000000) * 75000000 + ADDPRICE)
          });
          
          allConditions.push({
            period: '۳۶ ماهه',
            guarantor: 'یک فقره چک صیادی + یک ضامن',
            loanAmount: FIXED_AMOUNT_36,
            installment: loanAmount * INSTALLMENT_RATE_36,
            deposit: roundUpToNearestTenMillion((FIXED_AMOUNT_36 / 1000000000) * 75000000 + ADDPRICE)
          });
        }
        else if (loanAmount >= 5100000000 && loanAmount <= 7500000000) {
          allConditions.push({
            period: '۳۰ ماهه',
            guarantor: 'یک فقره چک صیادی + یک ضامن',
            loanAmount: loanAmount,
            installment: loanAmount * INSTALLMENT_RATE_30,
            deposit: roundUpToNearestTenMillion((loanAmount / 1000000000) * 75000000 + ADDPRICE)
          });
          
          allConditions.push({
            period: '۳۶ ماهه',
            guarantor: 'یک فقره چک صیادی + یک ضامن',
            loanAmount: FIXED_AMOUNT_36,
            installment: loanAmount * INSTALLMENT_RATE_36,
            deposit: roundUpToNearestTenMillion((loanAmount / 1000000000) * 75000000 + ADDPRICE)
          });
        }
        else if (loanAmount > 7500000000) {
          allConditions.push({
            period: '۳۶ ماهه',
            guarantor: 'یک فقره چک صیادی + یک ضامن',
            loanAmount: loanAmount,
            installment: loanAmount * INSTALLMENT_RATE_36,
            deposit: roundUpToNearestTenMillion((loanAmount / 1000000000) * 75000000 + ADDPRICE)
          });
        }
      }
      else if (creditRating === 'CD') {
        if (loanAmount <= 2000000000) {
          allConditions.push({
            period: '۲۴ ماهه',
            guarantor: 'یک فقره چک صیادی یا سفته الکترونیکی + یک ضامن',
            loanAmount: loanAmount,
            installment: loanAmount * INSTALLMENT_RATE_24,
            deposit: roundUpToNearestTenMillion((loanAmount / 1000000000) * 75000000 + ADDPRICE)
          });
          
          allConditions.push({
            period: '۳۰ ماهه',
            guarantor: 'یک فقره چک صیادی + دو ضامن',
            loanAmount: FIXED_AMOUNT_30,
            installment: loanAmount * INSTALLMENT_RATE_30,
            deposit: roundUpToNearestTenMillion((FIXED_AMOUNT_30 / 1000000000) * 75000000 + ADDPRICE)
          });
          
          allConditions.push({
            period: '۳۶ ماهه',
            guarantor: 'یک فقره چک صیادی + دو ضامن',
            loanAmount: FIXED_AMOUNT_36,
            installment: loanAmount * INSTALLMENT_RATE_36,
            deposit: roundUpToNearestTenMillion((FIXED_AMOUNT_36 / 1000000000) * 75000000 + ADDPRICE)
          });
        }
        else if (loanAmount >= 2100000000 && loanAmount <= 5000000000) {
          allConditions.push({
            period: '۲۴ ماهه',
            guarantor: 'یک فقره چک صیادی + یک ضامن',
            loanAmount: loanAmount,
            installment: loanAmount * INSTALLMENT_RATE_24,
            deposit: roundUpToNearestTenMillion((loanAmount / 1000000000) * 75000000 + ADDPRICE)
          });
          
          allConditions.push({
            period: '۳۰ ماهه',
            guarantor: 'یک فقره چک صیادی + دو ضامن',
            loanAmount: FIXED_AMOUNT_30,
            installment: loanAmount * INSTALLMENT_RATE_30,
            deposit: roundUpToNearestTenMillion((FIXED_AMOUNT_30 / 1000000000) * 75000000 + ADDPRICE)
          });
          
          allConditions.push({
            period: '۳۶ ماهه',
            guarantor: 'یک فقره چک صیادی + دو ضامن',
            loanAmount: FIXED_AMOUNT_36,
            installment: loanAmount * INSTALLMENT_RATE_36,
            deposit: roundUpToNearestTenMillion((FIXED_AMOUNT_36 / 1000000000) * 75000000 + ADDPRICE)
          });
        }
        else if (loanAmount >= 5100000000 && loanAmount <= 7500000000) {
          allConditions.push({
            period: '۳۰ ماهه',
            guarantor: 'یک فقره چک صیادی + دو ضامن',
            loanAmount: loanAmount,
            installment: loanAmount * INSTALLMENT_RATE_30,
            deposit: roundUpToNearestTenMillion((loanAmount / 1000000000) * 75000000 + ADDPRICE)
          });
          
          allConditions.push({
            period: '۳۶ ماهه',
            guarantor: 'یک فقره چک صیادی + دو ضامن',
            loanAmount: FIXED_AMOUNT_36,
            installment: loanAmount * INSTALLMENT_RATE_36,
            deposit: roundUpToNearestTenMillion((loanAmount / 1000000000) * 75000000 + ADDPRICE)
          });
        }
        else if (loanAmount > 7500000000) {
          allConditions.push({
            period: '۳۶ ماهه',
            guarantor: 'یک فقره چک صیادی + دو ضامن',
            loanAmount: loanAmount,
            installment: loanAmount * INSTALLMENT_RATE_36,
            deposit: roundUpToNearestTenMillion((loanAmount / 1000000000) * 75000000 + ADDPRICE)
          });
        }
      }
      
      // نمایش نتایج
      if (allConditions.length > 0) {
        resultText.style.display = 'none';
        tabsContainer.style.display = 'block';
        
        tabsHeader.innerHTML = '';
        tabsContent.innerHTML = '';
        
        allConditions.forEach((condition, index) => {
          const tabButton = document.createElement('button');
          tabButton.className = `tab-button ${index === 0 ? 'active' : ''}`;
          tabButton.textContent = condition.period;
          tabButton.onclick = () => switchTab(index);
          tabsHeader.appendChild(tabButton);
          
          const tabPanel = document.createElement('div');
          tabPanel.className = `tab-panel ${index === 0 ? 'active' : ''}`;
          tabPanel.id = `tab-${index}`;
          
          const formattedLoanAmount = condition.loanAmount.toLocaleString('fa-IR');
          const formattedInstallment = Math.ceil(condition.installment).toLocaleString('fa-IR');
          const formattedDeposit = Math.ceil(condition.deposit).toLocaleString('fa-IR');
          
          tabPanel.innerHTML = `
            <div class="loan-detail">
              <p><strong>شرط وام</strong> ${condition.guarantor}</p>
              <p><strong>مبلغ وام</strong> ${formattedLoanAmount} ریال</p>
              <p><strong>مبلغ هر قسط</strong> ${formattedInstallment} ریال</p>
              <p><strong>مبلغ سپرده</strong> ${formattedDeposit} ریال</p>
            </div>
          `;
          
          tabsContent.appendChild(tabPanel);
        });
      } else {
        resultText.innerText = 'برای این ترکیب رتبه اعتباری و مبلغ، شرایطی تعریف نشده است';
        tabsContainer.style.display = 'none';
        resultText.style.display = 'block';
      }
    }
    
    // تابع تغییر تب
    function switchTab(index) {
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelectorAll('.tab-panel').forEach(panel => {
        panel.classList.remove('active');
      });
      
      document.querySelectorAll('.tab-button')[index].classList.add('active');
      document.getElementById(`tab-${index}`).classList.add('active');
    }
  </script>
</body>
</html>
